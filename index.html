 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Greeting</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(270deg, #6a11cb, #2575fc, #ff6a00);
        background-size: 600% 600%;
        animation: gradientMove 12s ease infinite;
        overflow: hidden;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        text-align: center;
        color: white;
        padding: 40px 60px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        animation: fadeIn 2s ease forwards;
    }

    h1 {
        font-size: 3rem;
        letter-spacing: 2px;
        animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #fff, 0 0 20px #6a11cb, 0 0 30px #2575fc;
        }
        to {
            text-shadow: 0 0 20px #fff, 0 0 30px #ff6a00, 0 0 40px #ff6a00;
        }
    }

    /* Floating particles */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        animation: float 10s linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh) scale(0.5);
        }
        to {
            transform: translateY(-10vh) scale(1);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Hello, Welcome ✨</h1>
</div>

<script>
    // Generate floating circles
    for (let i = 0; i < 20; i++) {
        let circle = document.createElement("div");
        circle.classList.add("circle");

        let size = Math.random() * 20 + 10;
        circle.style.width = size + "px";
        circle.style.height = size + "px";
        circle.style.left = Math.random() * 100 + "vw";
        circle.style.animationDuration = (Math.random() * 10 + 5) + "s";
        circle.style.opacity = Math.random();

        document.body.appendChild(circle);
    }
</script>

</body>
</html>
